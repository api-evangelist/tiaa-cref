apis:
  - aid: tiaa-cref:tiaa-retirement-plans
    name: TIAA Retirement Plans
    description: >-
      TIAA's retirement plan services for individual participants, covering
      403(b), 457(b), 401(k), and IRA accounts. Products include TIAA
      Traditional fixed annuity, CREF variable annuities (stock, bond, money
      market, social choice, global equities, inflation-linked bond, equity
      index accounts), mutual funds, and the Brokerage Window for self-directed
      investing. TIAA RetirePlus provides custom target-date strategies with
      embedded lifetime income for institutional clients.
    humanURL: https://www.tiaa.org/public
    baseURL: https://www.tiaa.org/
    tags:
      - 403b
      - 457b
      - Annuities
      - CREF
      - IRA
      - Mutual Funds
      - Retirement
      - TIAA
    properties:
