aid: tiaa-cref
name: TIAA-CREF
description: >-
  TIAA (Teachers Insurance and Annuity Association of America, formerly TIAA-CREF)
  is a Fortune 100 leading provider of financial services for people in the academic,
  research, medical, cultural, and government fields. With $1.5 trillion in assets
  under management, TIAA serves over 4.7 million individual customers and more than
  12,000 institutional clients. Founded in 1918, TIAA invented the variable annuity
  in 1952 via the College Retirement Equities Fund (CREF) and is known for its TIAA
  Traditional fixed annuity and lifetime income solutions. TIAA wholly owns Nuveen
  Investments, a major institutional asset management firm. TIAA serves primarily
  non-profit organizations, universities, hospitals, and government entities with
  retirement plans including 403(b), 457(b), and 401(k) plans.
