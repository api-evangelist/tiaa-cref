        url: https://www.tiaa.org/public
      - type: Login
        url: https://auth.tiaa.org/public/authentication/login
      - type: Plan Sponsors
        url: https://www.tiaa.org/public/plansponsors
      - type: Investment Products
        url: https://www.tiaa.org/public/invest/services/wealth-management/investment-products
      - type: Lifetime Income
        url: https://www.tiaa.org/public/plansponsors/lifetime-income-leader
    contact:
      - FN: TIAA Customer Support
        url: https://www.tiaa.org/public/about-tiaa/contact

  - aid: tiaa-cref:tiaa-annuities
    name: TIAA Annuities
    description: >-
      TIAA's flagship annuity products for retirement income, including
      TIAA Traditional (a participating fixed annuity with guaranteed minimum
      plus historical above-floor credits), CREF variable annuities across
      multiple investment accounts, and the new TIAA MyChoice MYGA (a
      flexible-premium multi-year guaranteed annuity). TIAA is rated A++ by
      AM Best. Portfolios with TIAA Traditional have outperformed in over 90%
      of retirement scenarios per major studies.
    humanURL: https://www.tiaa.org/public
    tags:
      - Annuities
      - Fixed Annuity
      - Insurance
      - Lifetime Income
      - Retirement Income
      - Variable Annuity
    properties:
      - type: Documentation
        url: https://www.tiaa.org/public/pdf/t/tiaa-retirement-product-primer.pdf

  - aid: tiaa-cref:nuveen-investments
    name: Nuveen Investments
    description: >-
      Nuveen is TIAA's wholly owned institutional asset management subsidiary
      with $1.5 trillion AUM (as of March 2026). Nuveen provides mutual funds,
      ETFs, closed-end funds, target-date series with embedded lifetime income
      (Nuveen Lifecycle Income), responsible investing ESG strategies, fixed
      income, real assets, and alternatives. Nuveen collaborates with
      Morningstar Retirement, Transamerica, and other partners to distribute
      TIAA Secure Income Account solutions.
    humanURL: https://www.nuveen.com/
    baseURL: https://www.nuveen.com/
    tags:
      - Asset Management
      - ETFs
      - Fixed Income
      - Institutional
      - Mutual Funds
      - Nuveen
      - Target Date
    properties:
      - type: Website
        url: https://www.nuveen.com/
      - type: Documentation
        url: https://www.nuveen.com/en-us

  - aid: tiaa-cref:tiaa-wealth-management
    name: TIAA Wealth Management
    description: >-
      TIAA's wealth management services for individuals, including managed
      accounts, brokerage services, financial advisory services, life insurance,
      educational savings (529 plans), and banking products.
    humanURL: https://www.tiaa.org/public/invest/services/wealth-management
