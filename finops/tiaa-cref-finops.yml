principles:
  - name: Visibility
    description: Rely on partner-portal usage statements TIAA issues under the contract; no public usage
      API.
  - name: Allocation
    description: Allocate the contract cost to the retirement-services or recordkeeping team that owns
      the TIAA-CREF integration.
  - name: Optimization
    description: Tune at integration design — batch participant data calls, cache static reference data,
      avoid duplicate plan submissions.
  - name: Accountability
    description: A named partnership owner is accountable for the TIAA-CREF agreement, scope, and renewal.
