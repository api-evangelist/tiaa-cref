created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Finance
  - Retirement
  - Investment Management
  - B2B
description: TIAA-CREF (the historical brand of Teachers Insurance and Annuity Association of America
  - College Retirement Equities Fund, now marketed as TIAA) does not publish a public API rate card.
  Programmatic access to recordkeeping, annuity, and plan-administration surfaces is granted to plan
  sponsors, payroll partners, and aggregators under bilateral contracts.
sources:
  - https://www.tiaa.org/
notes: TIAA-CREF is the legacy brand for what is now TIAA. No public developer pricing exists; access
  and quotas are negotiated per partner.
plans:
  - id: tiaa-cref-contact-sales
    name: Contact Sales
    type: enterprise
    description: Bilateral commercial agreement covering TIAA-CREF / TIAA recordkeeping, annuity, and
      plan-administration data exchange. Pricing and limits set in the partner contract.
    entries:
      - label: Custom Quote
        name: custom_quote
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: TIAA-CREF Recordkeeping Integrations
      - name: Annuity Data Exchange
      - name: Plan Administration APIs
